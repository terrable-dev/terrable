name: GoReleaser Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  go-releaser-release:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HOMEBREW_TAP_BRANCH: ${{ github.ref_type == 'tag' && contains(github.ref_name, '-') && 'preview' || 'main' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read build metadata
        id: build_info
        run: |
          bash ./scripts/read_build_info.sh >> "$GITHUB_OUTPUT"

      - name: Select GoReleaser mode
        id: goreleaser_mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "args=release --snapshot --clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "args=release --clean" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.ACTIONS_APP_ID }}
          private_key: ${{ secrets.ACTIONS_APP_PRIVATE_KEY }}
          
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: GoReleaser release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: ${{ steps.goreleaser_mode.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          TERRABLE_BUILD_VERSION: ${{ steps.build_info.outputs.version }}
          TERRABLE_BUILD_PREVIEW_TAG: ${{ steps.build_info.outputs.preview_tag }}
