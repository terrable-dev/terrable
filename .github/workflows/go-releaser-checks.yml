name: GoReleaser Checks

on:
  pull_request:
    paths:
      - "**"
  workflow_dispatch:
    
jobs:
  go-releaser-checks:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read build metadata
        id: build_info
        run: |
          bash ./scripts/read_build_info.sh >> "$GITHUB_OUTPUT"

      - name: Reject preview-tag in pull requests to main
        if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}
        run: |
          if [[ -n "${{ steps.build_info.outputs.preview_tag }}" ]]; then
            echo "preview-tag must be empty for pull requests targeting main." >&2
            exit 1
          fi

      - name: Check GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check
        env:
          TERRABLE_BUILD_VERSION: ${{ steps.build_info.outputs.version }}
          TERRABLE_BUILD_PREVIEW_TAG: ${{ steps.build_info.outputs.preview_tag }}
  
      - name: GoReleaser dry-run
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot
        env:
          TERRABLE_BUILD_VERSION: ${{ steps.build_info.outputs.version }}
          TERRABLE_BUILD_PREVIEW_TAG: ${{ steps.build_info.outputs.preview_tag }}
  
