name: GoReleaser Checks

on:
  pull_request:
    paths:
      - "**"
  workflow_dispatch:
    
jobs:
  go-releaser-checks:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from file
        id: version
        run: |
          VERSION=$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)[[:space:]]*$/\1/p' terrable_build | head -n1)
          if [[ -z "$VERSION" ]]; then
            echo "Failed to read version from terrable_build" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check
        env:
          TERRABLE_BUILD_VERSION: ${{ steps.version.outputs.version }}
  
      - name: GoReleaser dry-run
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot
        env:
          TERRABLE_BUILD_VERSION: ${{ steps.version.outputs.version }}
  
