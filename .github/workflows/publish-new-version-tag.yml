name: Publish New Version Tag

on:
  push:
    branches:
      - main
    paths:
      - 'terrable_build'

jobs:
  update-version-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.ACTIONS_APP_ID }}
          private_key: ${{ secrets.ACTIONS_APP_PRIVATE_KEY }}

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Read build metadata
        id: build_info
        run: |
          bash ./scripts/read_build_info.sh >> "$GITHUB_OUTPUT"

      - name: Reject preview-tag on main
        run: |
          if [[ -n "${{ steps.build_info.outputs.preview_tag }}" ]]; then
            echo "preview-tag must be empty on main releases." >&2
            exit 1
          fi

      - name: Check whether stable tag already exists
        id: tag
        run: |
          TAG="v${{ steps.build_info.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            EXISTING_COMMIT=$(git rev-list -n1 "$TAG")
            if [[ "$EXISTING_COMMIT" == "$GITHUB_SHA" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Tag $TAG already exists at $EXISTING_COMMIT. Bump terrable_build version before releasing again." >&2
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: ${{ steps.tag.outputs.skip != 'true' }}
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git config user.name goreleaserbot
          git config user.email bot@goreleaser.com
          git tag -a v${{ steps.build_info.outputs.version }} -m "Version ${{ steps.build_info.outputs.version }}"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git v${{ steps.build_info.outputs.version }}
