name: Publish Preview Version Tag

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: Optional prerelease suffix like rc.1 or preview.42.
        required: false
        type: string

jobs:
  publish-preview-version-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.ACTIONS_APP_ID }}
          private_key: ${{ secrets.ACTIONS_APP_PRIVATE_KEY }}

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Read version from file
        id: version
        run: |
          VERSION=$(sed -nE 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)[[:space:]]*$/\1/p' terrable_build | head -n1)
          if [[ -z "$VERSION" ]]; then
            echo "Failed to read version from terrable_build" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build prerelease tag name
        id: tag
        run: |
          SUFFIX="${{ inputs.suffix }}"
          if [[ -z "$SUFFIX" ]]; then
            SUFFIX="preview.${GITHUB_RUN_NUMBER}"
          fi
          TAG="v${{ steps.version.outputs.version }}-${SUFFIX}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure preview tag does not already exist
        run: |
          if git rev-parse "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.tag.outputs.tag }} already exists" >&2
            exit 1
          fi

      - name: Create and push preview tag
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          git config user.name goreleaserbot
          git config user.email bot@goreleaser.com
          git tag -a "${{ steps.tag.outputs.tag }}" -m "Preview ${{ steps.tag.outputs.tag }}"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git "${{ steps.tag.outputs.tag }}"
